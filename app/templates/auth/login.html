{% extends "base.html" %}
{% block title %}Login - Invoice Generator{% endblock %}
{% block page_title %}Login{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <i class="fas fa-file-invoice fa-3x"></i>
        <h1>Invoice Generator</h1>
        <p>Sign in to your account</p>
    </div>
    <form method="POST" class="auth-form">
        <div class="form-group">
            <label for="username"><i class="fas fa-user"></i> Username</label>
            <input type="text" id="username" name="username" class="form-control" value="admin" required autofocus>
        </div>
        <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
    </form>
    <div class="auth-footer" style="text-align:center; margin-top:16px; font-size:12px; color:#999;">
        Default: admin / 1234
    </div>
</div>
{% endblock %}
