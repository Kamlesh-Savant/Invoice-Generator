{% extends "base.html" %}
{% block title %}{{ title }} - Invoice Generator{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body">
        <form method="POST" class="form">
            <div class="form-row">
                <div class="form-group col-6">
                    <label for="party_id">Party <span class="required">*</span></label>
                    <select id="party_id" name="party_id" class="form-control" required>
                        <option value="">Select Party</option>
                        {% for p in parties %}
                        <option value="{{ p.id }}" {% if payment and payment.party_id == p.id %}selected{% endif %}>
                            {{ p.party_name }} (Outstanding: {{ "%.2f"|format(p.outstanding()) }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group col-6">
                    <label for="payment_date">Payment Date</label>
                    <input type="date" id="payment_date" name="payment_date" class="form-control"
                           value="{{ payment.payment_date.strftime('%Y-%m-%d') if payment else '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-6">
                    <label for="payment_mode">Payment Mode <span class="required">*</span></label>
                    <select id="payment_mode" name="payment_mode" class="form-control" required>
                        {% for m in payment_modes %}
                        <option value="{{ m }}" {% if payment and payment.payment_mode == m %}selected{% endif %}>{{ m }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group col-6">
                    <label for="amount">Amount <span class="required">*</span></label>
                    <input type="number" id="amount" name="amount" class="form-control" step="0.01" min="0.01" required
                           value="{{ "%.2f"|format(payment.amount) if payment else '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-6">
                    <label for="reference_number">Reference Number</label>
                    <input type="text" id="reference_number" name="reference_number" class="form-control"
                           value="{{ payment.reference_number if payment else '' }}" placeholder="Cheque/Transaction ID">
                </div>
                <div class="form-group col-6">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes" class="form-control" rows="2">{{ payment.notes if payment else '' }}</textarea>
                </div>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('payments.index') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> {{ 'Update' if payment else 'Record Payment' }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
